<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contact-section">
        <h2>Contact Me</h2>

        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Enter your message" required></textarea>

            <button type="submit">Submit</button>
        </form>

        <!-- WhatsApp Contact Button with Icon -->
        <div class="whatsapp-contact">
            <h3>Chat with me on WhatsApp</h3>
            <a id="whatsapp-btn" href="https://wa.me/919289740755?text=Hello%20Akshey,%20I%20would%20like%20to%20connect%20with%20you!" 
               target="_blank" class="whatsapp-btn">
                <img src="images/whatsapp.png" alt="WhatsApp Icon"> Message on WhatsApp
            </a>
        </div>
    </div>
</body>
</html>
